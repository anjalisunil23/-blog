name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Generate Pages index
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const assetsDir = path.join('dist', 'client', 'assets');
          const files = fs.readdirSync(assetsDir);
          const jsFile = files.find((file) => file.startsWith('index-') && file.endsWith('.js'));
          const cssFile = files.find((file) => file.startsWith('styles-') && file.endsWith('.css'));

          if (!jsFile || !cssFile) {
            throw new Error('Could not find built index JS or styles CSS files in dist/client/assets.');
          }

          const html = `<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LearnWithAnjali</title>
    <link rel="stylesheet" href="./assets/${cssFile}" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./assets/${jsFile}"></script>
  </body>
</html>
`;

          fs.writeFileSync(path.join('dist', 'client', 'index.html'), html);
          NODE

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
